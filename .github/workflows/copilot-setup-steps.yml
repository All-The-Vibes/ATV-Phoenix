name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/agents/phoenix-cloud-worker.agent.md"
      - "tests/test_cloud_setup.py"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/agents/phoenix-cloud-worker.agent.md"
      - "tests/test_cloud_setup.py"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.14"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install Python dependencies
        run: >-
          python -m pip install --quiet --only-binary=:all:
          pytest==9.0.2 PyYAML==6.0.3 iniconfig==2.3.0
          packaging==24.2 pluggy==1.5.0 pygments==2.19.1
      - name: Validate cloud setup contract
        run: python -m pytest tests/test_cloud_setup.py -q
      - name: Build Phoenix MCP
        run: cargo build --release --locked --bin phoenix-mcp
